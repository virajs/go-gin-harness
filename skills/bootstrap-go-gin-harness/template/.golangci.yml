# golangci-lint configuration — strict from day one (greenfield).
# Layered, maximalist linter set; tune reactively with a justification comment.
# Docs: https://golangci-lint.run/usage/configuration/
#
# Run: `golangci-lint run`
# Auto-fix where supported: `golangci-lint run --fix`

run:
  timeout: 5m
  go: "1.24"
  modules-download-mode: readonly
  tests: true
  build-tags:
    - integration

output:
  formats:
    - format: colored-line-number
  sort-results: true
  print-issued-lines: true
  print-linter-name: true

linters:
  disable-all: true
  enable:
    # Correctness — bugs and broken-promise patterns
    - govet              # stdlib vet, including shadow + fieldalignment
    - errcheck           # unchecked error returns
    - staticcheck        # the canonical static-analysis suite (SA*, ST*, S1*)
    - gosec              # security issues (gosec rules — see exclusions for tests)
    - bodyclose          # http.Response.Body closed
    - sqlclosecheck      # *sql.Rows / *sql.Stmt closed
    - rowserrcheck       # rows.Err() checked
    - nilerr             # `return nil` after a real error
    - errorlint          # errors.Is/As/wrap usage
    - contextcheck       # context.Context propagation (NEVER call context.Background() in a request path)
    - noctx              # net/http without a context
    - nilnil             # never return (nil, nil)
    - exhaustive         # switch over enum types must be exhaustive
    - asciicheck         # no non-ASCII identifiers
    - durationcheck      # multiplied durations
    - makezero           # make([]T, n) and append (a common bug)
    - reassign           # reassigning package-level exported variables
    - tparallel          # t.Parallel() in subtests where appropriate
    - paralleltest       # tests that look parallel-safe should be
    - thelper            # mark helpers as t.Helper()

    # Performance / hot-path
    - prealloc           # preallocate slices
    - gocritic           # broad performance + style + diagnostic suite

    # Style / structure (subjective but consistent)
    - revive             # configurable replacement for golint
    - gocyclo            # cyclomatic complexity
    - gocognit           # cognitive complexity
    - funlen             # function length cap
    - dupl               # duplicate code blocks
    - unconvert          # redundant type conversions
    - unparam            # unused function parameters
    - misspell           # American English spelling in comments/identifiers
    - whitespace         # leading/trailing blank lines in funcs
    - gci                # import grouping (stdlib, third-party, local)
    - gofumpt            # stricter gofmt
    - nolintlint         # //nolint directives must have a justification

linters-settings:
  govet:
    enable-all: true
    disable:
      - fieldalignment   # noisy on early designs; re-enable when stable
    settings:
      shadow:
        strict: true

  staticcheck:
    checks: ["all"]

  gosec:
    excludes:
      - G104   # errcheck handles unchecked errors more cleanly
    config:
      G306: "0644"

  revive:
    severity: warning
    enable-all-rules: false
    rules:
      - name: exported           # all exported identifiers must be commented
      - name: package-comments
      - name: unexported-return
      - name: var-naming
      - name: context-as-argument
      - name: context-keys-type
      - name: errorf
      - name: error-naming
      - name: error-return
      - name: error-strings
      - name: indent-error-flow
      - name: range-val-in-closure
      - name: receiver-naming
      - name: time-equal
      - name: time-naming
      - name: unreachable-code
      - name: unused-parameter
      - name: unused-receiver
      - name: var-declaration
      - name: blank-imports
      - name: empty-block
      - name: superfluous-else
      - name: redefines-builtin-id

  gocyclo:
    min-complexity: 15
  gocognit:
    min-complexity: 25
  funlen:
    lines: 100
    statements: 60
    ignore-comments: true
  dupl:
    threshold: 120

  gci:
    sections:
      - standard
      - default
      - prefix({{ProjectName}})    # FIND/REPLACE with your module path
    custom-order: true

  gocritic:
    enabled-tags: [diagnostic, style, performance, opinionated]
    disabled-checks:
      - hugeParam            # noisy on idiomatic Go method receivers
      - paramTypeCombine     # subjective
      - unnamedResult        # we allow naked single-result returns

  errorlint:
    errorf: true
    asserts: true
    comparison: true

  exhaustive:
    default-signifies-exhaustive: true

  paralleltest:
    ignore-missing: false
    ignore-missing-subtests: false

  nolintlint:
    allow-leading-space: false
    require-explanation: true
    require-specific: true

issues:
  exclude-use-default: false
  exclude-rules:
    # Tests can be longer, more complex, and skip a few non-applicable checks.
    - path: _test\.go
      linters: [funlen, gocyclo, gocognit, dupl, gosec, errcheck, contextcheck, noctx]
    # Generated sqlc code is generated — don't lint it; treat it as a vendor file.
    - path: \.sql\.go
      linters: [revive, gocritic, gocognit, gocyclo, funlen, dupl, unparam]
    # Allow short main() with no exported docstring.
    - path: cmd/.*/main\.go
      text: "exported"
      linters: [revive]

  max-issues-per-linter: 0
  max-same-issues: 0
  new: false
