# .air.toml — hot-reload for local dev only.
# Optional: install with `go install github.com/air-verse/air@latest`.
# Run: `make dev` (alias for `air -c .air.toml`).

root = "."
testdata_dir = "testdata"
tmp_dir = ".air"

[build]
  cmd = "go build -o ./.air/api ./cmd/api"
  bin = "./.air/api"
  full_bin = "APP_ENV=dev ./.air/api"
  include_ext = ["go", "tpl", "tmpl", "html", "sql"]
  exclude_dir = ["bin", "dist", ".cover", ".air", "vendor", "node_modules", "test/integration", ".golangci-cache"]
  include_dir = ["cmd", "internal", "pkg", "migrations"]
  exclude_file = []
  exclude_regex = ["_test\\.go$", "_mock\\.go$", "\\.sql\\.go$"]
  exclude_unchanged = true
  follow_symlink = false
  log = "build-errors.log"
  delay = 200            # ms
  stop_on_error = true
  send_interrupt = true
  kill_delay = "2s"
  rerun = false
  rerun_delay = 500

[color]
  app     = ""
  build   = "yellow"
  main    = "magenta"
  runner  = "green"
  watcher = "cyan"

[log]
  time = false
  main_only = false

[misc]
  clean_on_exit = true

[screen]
  clear_on_rebuild = false
  keep_scroll = true
